name: Test

on:
  push:
    branches:
      - master
      - v*
  pull_request:

jobs:
  test-signing:
    runs-on: sonar-xs
    name: Test signing
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          cache: true
          tool_versions: |
            java temurin-21

      - name: Create test artifacts
        shell: bash
        run: |
          mkdir -p artifacts
          cat <<'EOF' > artifacts/hello.ps1
          Write-Host "Hello from signed script"
          EOF
          cat <<'EOF' > artifacts/goodbye.ps1
          Write-Host "Goodbye from signed script"
          EOF

      - name: Sign test artifacts
        uses: ./
        with:
          files: "artifacts/*.ps1"
          signing-profile: ${{ (github.ref_name == 'master' || startsWith(github.ref_name, 'v')) && 'release' || 'test' }}

  test-setup-mode:
    runs-on: sonar-xs
    name: Test setup mode
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup signing environment only
        uses: ./
        with:
          mode: setup
          signing-profile: ${{ (github.ref_name == 'master' || startsWith(github.ref_name, 'v')) && 'release' || 'test' }}

      - name: Verify exported environment variables
        shell: bash
        run: |
          [[ "${SIGNING_ENDPOINT:?}" == "https://weu.codesigning.azure.net" ]]
          [[ "${SIGNING_ACCOUNT:?}" == codesigning-* ]]
          [[ "${SIGNING_PROFILE:?}" == sonarsource-* ]]
          : "${ACCESS_TOKEN:?}"
